<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keuangan Pribadi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <span class="logo">💰 Keuangan Saya</span>
      <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
    </div>
  </div>

  <div class="container">

    <div class="summary">
      <div class="card">
        <p>Saldo Total</p>
        <h2 id="saldo">Rp 0</h2>
      </div>
      <div class="card income">
        <p>Pemasukan</p>
        <h2 id="total-masuk">Rp 0</h2>
      </div>
      <div class="card expense">
        <p>Pengeluaran</p>
        <h2 id="total-keluar">Rp 0</h2>
      </div>
      <div class="card">
        <p>Saldo Bank</p>
        <h2 id="saldo-bank">Rp 0</h2>
      </div>
      <div class="card">
        <p>Saldo Cash</p>
        <h2 id="saldo-cash">Rp 0</h2>
      </div>
    </div>

    <div class="form-box form-box-form">
      <h3>Tambah Transaksi</h3>
      <div class="type-toggle">
        <button id="btn-masuk" class="active-income" onclick="setType('masuk')">⬆ Pemasukan</button>
        <button id="btn-keluar" onclick="setType('keluar')">⬇ Pengeluaran</button>
        <button id="btn-transfer" onclick="setType('transfer')">↔ Transfer</button>
      </div>

      <div id="form-transfer" style="display:none">
        <div class="form-grid" id="form-grid-utama">
        <input type="text" id="keterangan"
          <div>
            <label style="font-size:12px;color:#94a3b8">Dari</label>
            <select id="transfer-dari">
              <option value="Cash">💵 Cash</option>
              <option value="BNI">🏦 BNI</option>
              <option value="BSI">🏦 BSI</option>
              <option value="DANA">🏦 DANA</option>
              <option value="OVO">🏦 OVO</option>
              <option value="SeaBank">🏦 SeaBank</option>
              <option value="GoPay">🏦 GoPay</option>
            </select>
          </div>
          <div>
            <label style="font-size:12px;color:#94a3b8">Ke</label>
            <select id="transfer-ke">
              <option value="BNI">🏦 BNI</option>
              <option value="BSI">🏦 BSI</option>
              <option value="DANA">🏦 DANA</option>
              <option value="OVO">🏦 OVO</option>
              <option value="SeaBank">🏦 SeaBank</option>
              <option value="GoPay">🏦 GoPay</option>
              <option value="Cash">💵 Cash</option>
            </select>
          </div>
        </div>
        <input type="number" id="transfer-jumlah" placeholder="Jumlah transfer (Rp)" min="0" style="width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;background:#f8fafc;margin-bottom:10px;font-family:'Inter',sans-serif" />
        <input type="date" id="transfer-tanggal" style="width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;background:#f8fafc;margin-bottom:10px;font-family:'Inter',sans-serif" />
        <button class="btn-simpan" onclick="lakukanTransfer()">↔ Transfer</button>
      </div>
      <div class="form-grid">
        <input type="text" id="keterangan" placeholder="Keterangan (mis. Gaji)" />
        <input type="number" id="jumlah" placeholder="Jumlah (Rp)" min="0" />
        <select id="kategori">
          <option value="Gaji">Gaji</option>
          <option value="Usaha">Usaha</option>
          <option value="Investasi">Investasi</option>
          <option value="Lainnya">Lainnya</option>
        </select>
        <input type="date" id="tanggal" />
        <select id="metode">
          <option value="Cash">💵 Cash</option>
          <option value="BNI">🏦 BNI</option>
          <option value="BSI">🏦 BSI</option>
          <option value="DANA">🏦 DANA</option>
          <option value="OVO">🏦 OVO</option>
          <option value="SeaBank">🏦 SeaBank</option>
          <option value="GoPay">🏦 GoPay</option>
        </select>
      </div>
      <button class="btn-simpan" id="btn-simpan-utama" onclick="tambahTransaksi()">+ Simpan Transaksi</button>
    </div>

    <div class="form-box form-box-grafik">
      <h3>📊 Pemasukan & Pengeluaran per Kategori</h3>
      <canvas id="grafikKategori"></canvas>
      <h3 style="margin-top:24px">🏦 Saldo Bank vs Cash</h3>
      <canvas id="grafikSaldo"></canvas>
    </div>

    <div class="form-box form-box-budget">
      <h3>🎯 Anggaran per Kategori</h3>
      <div id="budget-list"></div>
      <div class="budget-form">
        <select id="budget-kat">
          <option value="LAG">LAG</option>
          <option value="Sembako">Sembako</option>
          <option value="Toiletris">Toiletris</option>
          <option value="Pengasuh">Pengasuh</option>
          <option value="Kebutuhan Anak">Kebutuhan Anak</option>
          <option value="Liburan">Liburan</option>
          <option value="Makan">Makan</option>
          <option value="Transport">Transport</option>
          <option value="Tagihan">Tagihan</option>
          <option value="Kesehatan">Kesehatan</option>
          <option value="Hiburan">Hiburan</option>
          <option value="Pendidikan">Pendidikan</option>
          <option value="Lainnya">Lainnya</option>
        </select>
        <input type="number" id="budget-nominal" placeholder="Batas anggaran (Rp)" min="0" />
        <button class="btn-simpan" onclick="simpanBudget()">Set Anggaran</button>
      </div>
    </div>

    <div class="form-box form-box-riwayat">
      <h3>Riwayat Transaksi</h3>
      <div class="filter-bulan">
        <select id="filter-bulan" onchange="render()">
          <option value="">Semua Bulan</option>
        </select>
      </div>
      <ul id="list-transaksi">
        <li class="kosong">Belum ada transaksi.</li>
      </ul>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
